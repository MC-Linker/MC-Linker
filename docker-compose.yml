services:
  mc-linker:
    build: .
    image: lianecx/mc-linker
    container_name: mc-linker
    restart: on-failure
    depends_on:
      - mongodb
    ports:
      - "${BOT_PORT}:${BOT_PORT}"
    volumes:
      - type: bind
        source: ./download-cache
        target: /usr/src/app/download-cache
      - type: bind
        source: ./logs
        target: /usr/src/app/logs
      - type: bind
        source: ./config.json
        target: /usr/src/app/config.json
      - type: bind
        source: ./Custom-MC-Linker
        target: /usr/src/app/Custom-MC-Linker
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    environment:
      - WORKING_DIR=$PWD
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CONVERT=$CONVERT # true or false
      - NODE_ENV=production
      - NODE_MAX_HEAP_SIZE=512
      - SHARD_MAX_HEAP_SIZE=1024
    networks:
      - mongo-network

  mongodb:
    image: mongo
    container_name: mongodb
    restart: on-failure
    ports:
      - "27017:27017"
    volumes:
      - type: bind
        source: ./mongodb
        target: /data/db
    networks:
      - mongo-network

  analytics-dashboard:
    build: ./analytics-dashboard
    image: lianecx/mc-linker-analytics
    container_name: analytics-dashboard
    restart: on-failure
    depends_on:
      - mongodb
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      - NUXT_DATABASE_URL=${DATABASE_URL}
      - NUXT_DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - NUXT_SESSION_SECRET=${DASHBOARD_SESSION_SECRET}
    networks:
      - mongo-network

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    depends_on:
      - mongodb
    networks:
      - mongo-network
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_BASICAUTH_ENABLED=true
      - ME_CONFIG_BASICAUTH_USERNAME=$MONGO_EXPRESS_USERNAME
      - ME_CONFIG_BASICAUTH_PASSWORD=$MONGO_EXPRESS_PASSWORD
    ports:
      - '8081:8081'
    volumes:
      - ./data:/data/db

networks:
  mongo-network:
    driver: bridge
