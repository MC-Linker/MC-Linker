services:
  dev-mc-linker:
    build: .
    image: lianecx/dev-mc-linker
    container_name: dev-mc-linker
    restart: on-failure
    ports:
      - "${BOT_PORT}:${BOT_PORT}"
    volumes:
      - type: bind
        source: ./download-cache
        target: /usr/src/app/download-cache
      - type: bind
        source: ./logs
        target: /usr/src/app/logs
      - type: bind
        source: ./config.json
        target: /usr/src/app/config.json
      - type: bind
        source: ./Custom-MC-Linker
        target: /usr/src/app/Custom-MC-Linker
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    environment:
      - WORKING_DIR=$PWD
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - CONVERT=$CONVERT # true or false
      - NODE_ENV=development
      - NODE_MAX_HEAP_SIZE=1024
    networks:
      - mc-linker_mongo-network

  analytics-dashboard:
    build: ./analytics-dashboard
    image: lianecx/mc-linker-analytics
    container_name: analytics-dashboard
    restart: on-failure
    profiles:
      - analytics
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      - NUXT_DATABASE_URL=${DATABASE_URL}
      - NUXT_DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - NUXT_SESSION_SECRET=${DASHBOARD_SESSION_SECRET}
      - NUXT_LOGS_DIR=/usr/src/app/logs
    volumes:
      - type: bind
        source: ./logs
        target: /usr/src/app/logs
        read_only: true
    networks:
      - mc-linker_mongo-network

networks:
  mc-linker_mongo-network:
    external: true
